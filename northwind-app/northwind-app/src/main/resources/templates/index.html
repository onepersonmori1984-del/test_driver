<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Northwind Product Search</title>
  <link rel="stylesheet" th:href="@{/css/index.css}" href="/css/index.css">
</head>
<body>
<main>
  <h1>Northwind Product Search</h1>

  <form method="get" action="/">
    <label>
      Country
      <input name="country" th:value="${country}" autocomplete="country-name" placeholder="USA">
    </label>
    <button type="submit">Search</button>
  </form>

  <p class="error-message" th:if="${errorMessage}" th:text="${errorMessage}"></p>

  <table th:if="${products != null and !products.isEmpty()}">
    <thead>
    <tr>
      <th>Product</th>
      <th>Category</th>
      <th>Price</th>
      <th>Supplier</th>
      <th>Country</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="product : ${products}">
      <td th:text="${product.productName}"></td>
      <td th:text="${product.categoryName}"></td>
      <td th:text="${product.unitPrice}"></td>
      <td th:text="${product.supplierName}"></td>
      <td th:text="${product.country}"></td>
    </tr>
    </tbody>
  </table>

  <p class="empty" th:if="${noResults}">
    該当する商品はありません。
  </p>
</main>
</body>
</html>
